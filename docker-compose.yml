services:
  nginx:
    image: nginx:1.24-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/edulearn/dist:/var/www/edulearn/dist:ro
      - /var/www/smartrs/dist:/var/www/smartrs/dist:ro
      - /var/www/mega/dist:/var/www/mega/dist:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nebulide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nebulide}
      POSTGRES_DB: ${DB_NAME:-nebulide}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  app:
    image: nebulide:latest
    build: .
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    depends_on:
      - postgres
      - redis
      - telegram-bot-api
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis:6379
      TELEGRAM_API_URL: http://telegram-bot-api:8081
    volumes:
      - /home/nebulide/workspace:/home/nebulide/workspace
      - /home/nebulide/workspaces:/home/nebulide/workspaces
      - shared_data:/home/nebulide/shared
      - /tmp/nebulide:/tmp
      - usr_local:/usr/local
      - ssh_keys:/root/.ssh
      - ~/.ssh:/root/.ssh-mount:ro
      - claude_data:/root/.claude

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api

  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
    container_name: code-server
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - DEFAULT_WORKSPACE=/config/workspace
    volumes:
      - code-server-config:/config
      - /home/nebulide/workspace:/config/workspace

volumes:
  redis_data:
  postgres_data:
  usr_local:
  ssh_keys:
  claude_data:
  shared_data:
  code-server-config:
  telegram_bot_api_data:
  nginx_logs:
