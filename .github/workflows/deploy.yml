name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          script: |
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S git -C /opt/nebulide pull origin main
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S npm ci --prefix /opt/nebulide/frontend
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S npm run build --prefix /opt/nebulide/frontend
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S npm ci --prefix /opt/nebulide/admin
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S npm run build --prefix /opt/nebulide/admin
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S bash -c 'cp -r /opt/nebulide/admin/dist/* /var/www/mega/dist/'
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S sh -c 'cd /opt/nebulide/backend && /usr/local/go/bin/go build -o nebulide .'
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S docker compose -f /opt/nebulide/docker-compose.yml build
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S docker compose -f /opt/nebulide/docker-compose.yml down

            # Stop host nginx before starting Docker nginx (ports 80/443)
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S systemctl stop nginx 2>/dev/null || true
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S systemctl disable nginx 2>/dev/null || true

            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S docker compose -f /opt/nebulide/docker-compose.yml up -d

            # Certbot renewal hook: reload Docker nginx on certificate renewal
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S bash -c 'cat > /etc/letsencrypt/renewal-hooks/deploy/reload-docker-nginx.sh << "HOOK"
            #!/bin/bash
            docker compose -f /opt/nebulide/docker-compose.yml exec -T nginx nginx -s reload
            HOOK'
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-docker-nginx.sh

            # SSH login Telegram notifications (PAM — successful logins)
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S chmod 700 /opt/nebulide/ssh-notify.sh
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S chown root:root /opt/nebulide/ssh-notify.sh
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S bash -c 'grep -q ssh-notify /etc/pam.d/sshd || echo "session optional pam_exec.so /opt/nebulide/ssh-notify.sh" >> /etc/pam.d/sshd'

            # SSH failed login watcher (systemd service — monitors auth.log)
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S chmod 700 /opt/nebulide/ssh-watcher.sh
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S chown root:root /opt/nebulide/ssh-watcher.sh
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S cp /opt/nebulide/ssh-watcher.service /etc/systemd/system/ssh-watcher.service
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S systemctl daemon-reload
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S systemctl enable ssh-watcher.service
            echo "${{ secrets.ROOT_PASSWORD }}" | sudo -S systemctl restart ssh-watcher.service

            echo "Deployed successfully"
