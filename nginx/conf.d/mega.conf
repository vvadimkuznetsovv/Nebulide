# MEGA Nebulide Admin Panel
# TODO: Add SSL after DNS A-record for mega.nebulide.ru → 45.156.20.105 + certbot

server {
    listen 80;
    server_name mega.nebulide.ru;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10M;

    access_log /var/log/nginx/mega.access.log;
    error_log /var/log/nginx/mega.error.log;

    # Login — strict rate limit
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_buffering off;
    }

    # Block vulnerability scanners
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* /(wp-includes|wp-admin|wp-content|wp-login|xmlrpc|wlwmanifest) {
        return 444;
    }

    # SPA — admin static files
    root /var/www/mega/dist;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
