# HTTP -> HTTPS
server {
    listen 80;
    server_name mega.nebulide.ru;
    return 301 https://$host$request_uri;
}

# HTTPS — MEGA Nebulide Admin Panel
server {
    listen 443 ssl http2;
    server_name mega.nebulide.ru;

    ssl_certificate /etc/letsencrypt/live/mega.nebulide.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mega.nebulide.ru/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers (A+ grade) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://mega.nebulide.ru; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    client_max_body_size 10M;

    access_log /var/log/nginx/mega.access.log;
    error_log /var/log/nginx/mega.error.log;

    # --- Static assets (long cache) ---
    location /assets/ {
        root /var/www/mega/dist;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Login — strict rate limit
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_buffering off;
    }

    # Block vulnerability scanners
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* /(wp-includes|wp-admin|wp-content|wp-login|xmlrpc|wlwmanifest) {
        return 444;
    }
    location ~ /\. {
        deny all;
        return 404;
    }

    # SPA — admin static files
    root /var/www/mega/dist;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
